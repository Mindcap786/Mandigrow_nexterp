<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer circle ring - white border -->
  <circle cx="256" cy="256" r="256" fill="#1B5E20"/>
  <circle cx="256" cy="256" r="236" fill="white"/>
  <circle cx="256" cy="256" r="218" fill="#1B5E20"/>

  <!-- M letterform with leaf peaks (white on green) -->
  <!-- Left leg of M -->
  <rect x="98" y="180" width="58" height="190" rx="6" fill="white"/>
  <!-- Right leg of M -->
  <rect x="356" y="180" width="58" height="190" rx="6" fill="white"/>
  <!-- Left diagonal (M valley left) -->
  <polygon points="98,180 156,180 228,310 170,310" fill="white"/>
  <!-- Right diagonal (M valley right) -->
  <polygon points="414,180 356,180 284,310 342,310" fill="white"/>
  <!-- Bottom bridge filling the valley -->
  <rect x="170" y="290" width="172" height="40" rx="6" fill="white"/>

  <!-- Left leaf peak (top of left M arm) -->
  <ellipse cx="156" cy="168" rx="36" ry="20" transform="rotate(-30 156 168)" fill="white"/>
  <ellipse cx="134" cy="155" rx="26" ry="14" transform="rotate(-30 134 155)" fill="#1B5E20"/>

  <!-- Right leaf peak (top of right M arm) -->
  <ellipse cx="356" cy="168" rx="36" ry="20" transform="rotate(30 356 168)" fill="white"/>
  <ellipse cx="378" cy="155" rx="26" ry="14" transform="rotate(30 378 155)" fill="#1B5E20"/>

  <!-- Small orange accent dot / seed between the two leaves -->
  <circle cx="256" cy="145" r="14" fill="#E87010"/>
</svg>
