<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: Deep forest green rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#1B5E20"/>

  <!-- White M mark with bar-chart peaks (left bar shorter, right bar taller) -->
  <!-- M base line -->
  <rect x="96" y="372" width="320" height="32" rx="10" fill="white"/>

  <!-- Left bar of M (shorter) -->
  <rect x="96" y="180" width="68" height="224" rx="10" fill="white"/>

  <!-- Middle left diagonal descending (M valley) - left half -->
  <polygon points="96,180 164,180 220,300 164,300" fill="white"/>

  <!-- Middle peak (center of M) -->
  <polygon points="164,180 256,340 256,340 220,300 256,120 292,300 256,340" fill="white"/>

  <!-- Full M shape using path -->
  <!-- Cleaner approach: draw complete M -->
  <path d="
    M 96 372
    L 96 168
    L 164 168
    L 256 308
    L 348 168
    L 416 168
    L 416 372
    L 348 372
    L 348 268
    L 256 408
    L 164 268
    L 164 372
    Z
  " fill="white"/>

  <!-- Right bar of M (taller - chart going up) -->
  <!-- Already handled by M path above -->

  <!-- Optional: small orange accent leaf/sprout on top of right peak -->
  <ellipse cx="360" cy="148" rx="22" ry="12" transform="rotate(-35 360 148)" fill="#F57C00" opacity="0.9"/>
  <ellipse cx="348" cy="140" rx="14" ry="8" transform="rotate(15 348 140)" fill="#F57C00" opacity="0.85"/>
</svg>
